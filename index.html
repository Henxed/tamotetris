<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <title>TETRAPET</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell is-game-tab">
      <header class="app-header">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="Меню">☰</button>
        <h1>TETRAPET</h1>
        <div class="wallet" aria-label="Монетки">
          <span class="coin">◈</span>
          <strong id="coins">0</strong>
        </div>
      </header>

      <div class="menu-drawer" id="menuDrawer" hidden>
        <div class="menu-card">
          <div class="menu-card-head">
            <strong>TETRAPET</strong>
            <button class="icon-btn" id="closeMenuBtn" type="button" aria-label="Закрыть меню">×</button>
          </div>

          <div class="menu-tabs" aria-label="Разделы игры">
            <button class="active" data-tab="game" type="button">▦ Тетрис</button>
            <button data-tab="pet" type="button">◌ Питомец</button>
            <button data-tab="shop" type="button">◈ Магазин</button>
          </div>

          <div class="menu-section">
            <span class="storage-badge" id="storageStatus" title="Состояние сохранения">localStorage</span>
          </div>

          <div class="menu-section game-settings" aria-label="Мини-настройки управления">
            <button id="toggleControlsBtn" type="button">Кнопки: выкл</button>
            <button id="invertControlsBtn" type="button">Инверсия: выкл</button>
            <button id="touchControlsBtn" type="button">Тач: вкл</button>
            <button id="swipeDropBtn" type="button">Свайп вниз: вкл</button>
          </div>
        </div>
      </div>

      <main class="layout">
        <section class="panel game-panel" data-tab-panel="game">
          <span class="sr-only" id="gameStatus" aria-live="polite">Готов к игре</span>

          <div class="game-hud" aria-label="Статистика тетриса">
            <div class="hud-stats">
              <div class="hud-stat"><span>Score</span><strong id="score">0</strong></div>
              <div class="hud-stat"><span>Lines</span><strong id="lines">0</strong></div>
              <div class="hud-stat"><span>Combo</span><strong id="combo">0</strong></div>
              <div class="hud-stat"><span>Best</span><strong id="bestScore">0</strong></div>
            </div>

            <div class="hud-actions" aria-label="Управление партией">
              <button class="primary-btn hud-icon-btn" id="startBtn" type="button" aria-label="Старт" title="Старт">▶</button>
              <button class="ghost-btn reset-btn hud-icon-btn" id="resetBtn" type="button" aria-label="Сбросить текущую партию" title="Сбросить текущую партию">↻</button>
            </div>

            <div class="hud-next" aria-label="Следующая фигура">
              <span>Next</span>
              <canvas id="nextCanvas" width="72" height="72" aria-label="Следующая фигура"></canvas>
            </div>
          </div>

          <div class="game-stage">
            <canvas id="gameCanvas" width="240" height="480" aria-label="Игровое поле тетриса"></canvas>
            <p class="touch-hint" id="touchHint">Тап — поворот · свайп вбок — движение · уверенный свайп вниз — сброс</p>
            <div class="last-run" id="lastRunResult" hidden></div>
          </div>

          <div class="controls" id="controlsPanel" aria-label="Запасные кнопки управления" hidden>
            <button data-action="left" type="button">←</button>
            <button data-action="rotate" type="button">↻</button>
            <button data-action="right" type="button">→</button>
            <button data-action="down" type="button">↓</button>
            <button data-action="drop" class="wide" type="button">Бросить вниз</button>
          </div>
        </section>

        <section class="panel pet-panel" data-tab-panel="pet" hidden>
          <div class="screen-title">
            <div>
              <p class="eyebrow">Питомец</p>
              <h2 id="petName">Бульк</h2>
            </div>
            <button class="ghost-btn" id="renameBtn" type="button">Имя</button>
          </div>

          <div class="offline-notice" id="offlineNotice" hidden></div>

          <div class="aquarium" id="aquarium">
            <div class="water-glow"></div>
            <div class="bubbles" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="decor decor-1" id="decorOne"></div>
            <div class="decor decor-2" id="decorTwo"></div>
            <div class="pet-sprite" id="petSprite" aria-label="Питомец">
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="mouth"></span>
            </div>
            <div class="pet-thought" id="petThought">сыграй пару линий?</div>
            <div class="pet-death-overlay" id="petDeathOverlay" hidden>
              <strong>Питомец не выжил</strong>
              <p>Можно начать новую жизнь. Монеты и рекорд сохранятся.</p>
              <button class="primary-btn" id="newPetBtn" type="button">Новый питомец</button>
            </div>
          </div>

          <div class="meters">
            <label>Сытость <meter id="hunger" min="0" max="100"></meter><span id="hungerText">0</span></label>
            <label>Настроение <meter id="mood" min="0" max="100"></meter><span id="moodText">0</span></label>
            <label>Чистота <meter id="clean" min="0" max="100"></meter><span id="cleanText">0</span></label>
            <label>Энергия <meter id="energy" min="0" max="100"></meter><span id="energyText">0</span></label>
          </div>

          <div class="action-grid" id="petActions">
            <button id="feedBtn" type="button">Покормить</button>
            <button id="cleanBtn" type="button">Почистить</button>
            <button id="playBtn" type="button">Поиграть</button>
            <button id="sleepBtn" type="button">Сон</button>
          </div>
        </section>

        <section class="panel shop-panel" data-tab-panel="shop" hidden>
          <div class="screen-title">
            <div>
              <p class="eyebrow">Магазин</p>
              <h2>Еда, уход и декор</h2>
            </div>
          </div>
          <div class="shop-list" id="shopList"></div>
        </section>
      </main>
    </div>

    <template id="shopItemTemplate">
      <article class="shop-item">
        <div class="item-icon"></div>
        <div>
          <h3></h3>
          <p></p>
        </div>
        <button type="button"></button>
      </article>
    </template>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
